name: Golium Pipeline

on:
  schedule:
    - cron: '0 9,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    concurrency:
      group: golium-pipeline
      cancel-in-progress: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 🔹 SCRAPER
      - name: Run scraper
        run: |
          echo "Running scraper..."
          python scraper.py all

      # 🔹 VALIDACIÓN DATA.JSON
      - name: Validate data.json
        run: |
          echo "Validating data.json..."
          python -c "import json; json.load(open('data.json'))"

      # 🔹 MOTOR (LO IMPORTANTE)
      - name: Run pipeline
        run: |
          echo "Running model pipeline..."
          python run_pipeline.py --config engine_config.json

      # 🔹 VALIDACIÓN OUTPUTS
      - name: Validate public-data outputs
        run: |
          echo "Validating outputs..."
          python -c "import json; json.load(open('public-data/data.json'))"
          python -c "import json; json.load(open('public-data/picks.json'))"
          python -c "import json; json.load(open('public-data/metrics.json'))"
          python -c "import json; json.load(open('public-data/model-info.json'))"

      # 🔹 COMMIT SOLO SI HAY CAMBIOS
      - name: Commit & push outputs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data.json public-data/*.json

          git diff --staged --quiet || git commit -m "update golium data $(date -u +'%Y-%m-%d %H:%M UTC')"

          git push
