name: Golium Pipeline

on:
  schedule:
    - cron: '0 9,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: golium-pipeline
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run scraper
        run: |
          python scraper.py all

      - name: Validate data.json
        run: |
          python -c "import json; json.load(open('data.json', encoding='utf-8'))"

      - name: Run model pipeline
        run: |
          python run_pipeline.py --config engine_config.json

      - name: Validate public-data outputs
        run: |
          python -c "import json; json.load(open('public-data/data.json', encoding='utf-8'))"
          python -c "import json; json.load(open('public-data/picks.json', encoding='utf-8'))"
          python -c "import json; json.load(open('public-data/metrics.json', encoding='utf-8'))"
          python -c "import json; json.load(open('public-data/model-info.json', encoding='utf-8'))"

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data.json public-data/*.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update golium outputs $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi